$fontFamily = JetBrainsMono Nerd Font

# ── Кольори ─────────────────────────────────────────────────────────────────
# Головний зелений (час, акцент)
$col_time       = rgba(14, 146, 69, 0.95)
# Акцент — для рамок та активних елементів
$col_accent     = rgba(22, 163, 74, 0.90)
# Інформаційний — середня яскравість (топ-бар, батарея)
$col_info       = rgba(20, 130, 58, 0.82)
# Попередження — CapsLock
$col_warn       = rgba(234, 179, 8, 1.0)
# Помилка — невірний пароль
$col_fail       = rgba(239, 68, 68, 1.0)
# Фон поля вводу
$col_input_bg   = rgba(3, 10, 5, 0.70)
# ────────────────────────────────────────────────────────────────────────────

background {
    monitor =
    path = ~/Pictures/wallpapers/forest-and-montain.jpg
    blur_size = 3
    blur_passes = 1
    noise = 0.0117
    contrast = 0.85
    brightness = 0.55
    vibrancy = 0.08
    vibrancy_darkness = 0.0
}

# ── ТОП ЛІВИЙ: CPU | RAM ─────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:3000] ~/.config/hypr/scripts/sysinfo.sh
    color = $col_info
    font_size = 13
    font_family = $fontFamily
    position = 2%, -3%
    halign = left
    valign = top
}

# ── ТОП ЦЕНТР: ДАТА ──────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = $col_info
    font_size = 13
    font_family = $fontFamily Bold
    position = 0, -3%
    halign = center
    valign = top
}

# ── ТОП ПРАВИЙ: РОЗКЛАДКА ────────────────────────────────────────────────────
label {
    monitor =
    text = 󰌌  $LAYOUT
    color = $col_info
    font_size = 13
    font_family = $fontFamily
    position = -2%, -3%
    halign = right
    valign = top
}

# ── ЦЕНТР: ЧАС ───────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $col_time
    font_size = 130
    font_family = $fontFamily Bold
    position = 0, 80
    halign = center
    valign = center
}

# ── НАД ПОЛЕМ: CAPS LOCK ─────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:500] ~/.config/hypr/scripts/capslock.sh
    color = $col_warn
    font_size = 13
    font_family = $fontFamily Bold
    position = 0, -30
    halign = center
    valign = center
}

# ── ПОЛЕ ВВОДУ ───────────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.20
    dots_center = true
    dots_rounding = -1
    outer_color = $col_accent
    inner_color = $col_input_bg
    font_color = $col_time
    fade_on_empty = false
    fade_timeout = 1500
    placeholder_text = <i>Password, $USER...</i>
    hide_input = false
    rounding = -1
    check_color = $col_accent
    fail_color = $col_fail
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = $col_warn
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -80
    halign = center
    valign = center
}

# ── БАТАРЕЯ: НИЖНІЙ ПРАВИЙ ───────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:5000] ~/.config/hypr/scripts/battery.sh
    color = $col_info
    font_size = 13
    font_family = $fontFamily
    position = -2%, 3%
    halign = center
    valign = bottom
}
