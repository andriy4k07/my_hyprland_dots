#--- WINDOW RULES ------------------------------------------------------------
# hyprctl clients - щоб дізнатися клас додатку

#--- Монітори ------------------------------------------------------------
workspace = 1, monitor:eDP-1, default:true

workspace = 2, monitor:eDP-1, default:true
workspace = 10, monitor:HDMI-A-1, default:true

#--- Прозорість ----------------------------------------------------
windowrule {
  name = windowrule-1
  opacity = 0.89 override 0.89 override
  match:class = .*
}

windowrule {
  name = windowrule-2
  opacity = 0.6 0.5
  match:class = ^(kitty)$
}

windowrule {
  name = windowrule-3
  opacity = 1.0 1.0
  match:class = ^(com\.obsproject\.Studio|krita|gimp)$
}

#--- Вимкнення blur для XWayland ---------------------------------------------
windowrule {
  name = windowrule-5
  no_blur = on
  match:xwayland = 1
}

#--- Workspace 1 ---

windowrule {
  name = brave
  workspace = 1
  tile = on
  match:class = ^([Bb]rave-browser)$
}

windowrule {
  name = no-auto-resize-browsers
  suppress_event = maximize fullscreen
  match:class = ^([Bb]rave-browser|firefox|chromium)$
}

windowrule {
  name = browsers-to-workspace-1
  workspace = 1
  tile = on
  match:class = ^([Bb]rave-browser|[Bb]rave|firefox|Firefox|firefox-esr|firefoxdeveloperedition|chromium|Chromium|[Gg]oogle-chrome|[Mm]ozilla)$
}

windowrule {
  name = windowrule-31
  workspace = 1
  match:title = ^(New Private Tab - Brave)$
}


#--- Workspace 2 ---

windowrule {
  name = telegram
  opacity = 0.8 0.7
  float = on
  size = (monitor_w*0.33) (monitor_h*0.93)
  move = ((monitor_w*0.01)) ((monitor_h*0.06))
  workspace = 2
  match:class = ^(org.telegram.desktop)$
}

windowrule {
  name = signal&discord
  float = on
  size = (monitor_w*0.63) (monitor_h*0.93)
  move = ((monitor_w*0.35)) ((monitor_h*0.06))
  workspace = 2
  match:class = ^(discord|com\.discordapp\.Discord|[Ss]ignal|vesktop)$
}


#--- Workspace 3 ---
#--- Workspace 4 ---
#--- Workspace 5 ---

windowrule {
  name = windowrule-9
  workspace = 5
  match:class = ^(obsidian)$
}

windowrule {
  name = electron
  float = on
  size = (monitor_w*0.5)
  center = on
  match:class = ^(electron)$
}


#--- Workspace 6 ---

windowrule {
  name = jetbrains-workspace
  workspace = 6
  # center = on
  match:class = ^(jetbrains-clion|jetbrains-pycharm|jetbrains-idea|jetbrains-rider|jetbrains-webstorm|jetbrains-datagrip)$
}

windowrule {
    name = jetbrains-update-float
    float = on
    match:title = ^Update$
    match:class = .*updater.*
}

windowrule {
  name = jetbrains-focus
  no_initial_focus = on
  match:class = ^jetbrains-.*$
  match:float = 1
  match:title = ^$|^\s$|^win\d+$
}

#--- QEMU/KVM

windowrule {
  name = windowrule-18
  float = on
  workspace = 6
  match:class = ^(virt-manager)$
}

windowrule {
  name = windowrule-19
  size = (monitor_w*0.33) (monitor_h*0.93)
  move = ((monitor_w*0.65)) ((monitor_h*0.06))
  match:title = ^(Virtual Machine Manager)$
}

windowrule {
  name = windowrule-20
  float = on
  size = (monitor_w*0.63) (monitor_h*0.93)
  move = ((monitor_w*0.01)) ((monitor_h*0.06))
  match:title = ^(.* on QEMU/KVM)$
}


#--- Workspace 7 ---

windowrule {
  name = games-workspace
  # center = on
  workspace = 7
  match:class = ^(net.lutris.Lutris|steam|Steam Settings|Налаштування Steam|steam_app.*|by-gdev-Main|org-tlauncher-tlauncher-rmo-TLauncher|Minecraft.*|Spotify)$
}

# --- Tearing ---
windowrule {
  name = no-tearing-exe
  immediate = on
  match:title = ^(.*\.exe|Minecraft.*)$
}

windowrule {
  name = no-tearing-steam
  immediate = on
  match:class = ^steam_app.*
}

#--- Workspace 8 ---
#--- Workspace 9 ---

windowrule {
  name = windowrule-30
  workspace = 9
  match:class = ^(Mullvad Browser)$
}


#--- Workspace 10 ---

#--- Float ---

windowrule {
  name = windowrule-35
  float = on
  size = (monitor_w*0.5) (monitor_h*0.5)
  center = on
  match:title = .*\b([Oo]pen|[Ss]ave)\b.*
}

windowrule {
  name = nemo-float
  float = on
  size = (monitor_w*0.48) (monitor_h*0.48)
  # center = on
  move = ((monitor_w*0.006)) ((monitor_h*0.06))
  match:class = ^(nemo-float)$
}

windowrule {
  name = kitty-waybar
  float = on
  size = (monitor_w*0.5) (monitor_h*0.5)
  move = ((monitor_w*0.25)) ((monitor_h*0.06))
  match:title = ^(kitty-float)$
}

windowrule {
  name = nemo-waybar
  float = on
  size = (monitor_w*0.5) (monitor_h*0.5)
  move = ((monitor_w*0.25)) ((monitor_h*0.06))
  match:class = ^(nemo)$
  match:title = ^Downloads$
}

windowrule {
  name = easyeffects-waybar
  float = on
  pin = on
  size = (monitor_w*0.4) (monitor_h*0.4)
  move = ((monitor_w*0.57)) ((monitor_h*0.06))
  match:class = ^(com.github.wwmm.easyeffects)$
}


windowrule {
  name = nextcloud-waybar
  float = on
  size = (monitor_w*0.2) (monitor_h*0.5)
  move = ((monitor_w*0.6)) ((monitor_h*0.06))
  match:class = ^(com.nextcloud.desktopclient.nextcloud)$
}


windowrule {
  name = proton-pass-waybar
  float = on
  size = (monitor_w*0.4) (monitor_h*0.4)
  move = ((monitor_w*0.56)) ((monitor_h*0.18))
  match:class = ^(Proton Pass)$
}


windowrule {
  name = proton-vpn-waybar
  float = on
  size = (monitor_w*0.4) (monitor_h*0.4)
  move = ((monitor_w*0.53)) ((monitor_h*0.14))
  match:class = ^(protonvpn-app)$
}


windowrule {
  name = windowrule-44
  float = on
  size = (monitor_w*0.4) (monitor_h*0.4)
  center = on
  match:class = ^(proton-authenticator|blueman-manager)$
}


windowrule {
  name = simple-float
  float = on
  match:class = ^(viewnior|xdg-desktop-portal-gtk)$
}


#--- Tiling -------------------------------------------------------------------
windowrule {
  name = windowrule-46
  tile = on
  match:class = ^dev\.warp\.Warp$
}


#--- Picture-in-Picture ------------------------------------------------------
windowrule {
  name = Picture-in-Picture
  float = on
  keep_aspect_ratio = on
  move = ((monitor_w*0.74)) ((monitor_h*0.06))
  size = (monitor_w*0.25) (monitor_h*0.25)
  pin = on
  idle_inhibit = focus
  match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
}

windowrule {
  name = windowrule-48
  idle_inhibit = focus 
  match:class = ^(mpv|vlc)$
}

windowrule {
  name = windowrule-49
  float = on
  keep_aspect_ratio = on
  move = ((monitor_w*0.79)) ((monitor_h*0.35))
  size = (monitor_w*0.2) (monitor_h*0.63)
  pin = on
  match:title = ^(TikTok - Make Your Day)(.*)$
}

#--- Pin -------------------------------------------------------------------
windowrule {
  name = Zoom-sharing
  float = on
  keep_aspect_ratio = on
  move = ((monitor_w*0.74)) ((monitor_h*0.06))
  pin = on
  idle_inhibit = focus
  match:title = ^(app.zoom.us is sharing your screen.*)$
}


#--- Діалогові вікна (центр + float) -----------------------------------------
windowrule {
  name = dialog-boxes 
  center = on
  float = on
  match:title = ^(Open File|Open Files|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload|Custom application|Untitled|Select the extension directory.)(.*)$
}

windowrule {
  name = windowrule-51
  center = on
  float = on
  size = (monitor_w*0.5) (monitor_h*0.5)
  match:title = ^(.*Properties.*)$
}


#--- Без тіней для tiled-вікон -----------------------------------------------
windowrule {
  name = windowrule-54
  no_shadow = on
  match:float = 0
}

#--- SPECIAL WORKSPACE RULES ---------------------------------------------------------
workspace = special:sys, gapsout:10

#--- LAYER RULES -------------------------------------------------------------

layerrule {
  name = layerrule-1
  xray = 1
  match:namespace = .*
}

# layerrule = noanim, .*
layerrule {
  name = layerrule-2
  no_anim = on
  match:namespace = wofi
}

layerrule {
  name = layerrule-3
  no_anim = on
  match:namespace = selection
}

layerrule {
  name = layerrule-4
  no_anim = on
  match:namespace = overview
}

layerrule {
  name = layerrule-5
  no_anim = on
  match:namespace = anyrun
}

layerrule {
  name = layerrule-6
  no_anim = on
  match:namespace = indicator.*
}

layerrule {
  name = layerrule-7
  no_anim = on
  match:namespace = osk
}

layerrule {
  name = layerrule-8
  no_anim = on
  match:namespace = hyprpicker
}

#--- GTK Layer Shell ----------------------------------------------------------
layerrule {
  name = layerrule-9
  blur = on
  ignore_alpha = 0
  match:namespace = ^(gtk-layer-shell)$
}


#--- Launcher / Notifications / Logout ----------------------------------------
layerrule {
  name = layerrule-10
  blur = on
  ignore_alpha = 0.5
  match:namespace = launcher
}

layerrule {
  name = layerrule-11
  blur = on
  ignore_alpha = 0.69
  match:namespace = notifications
}

layerrule {
  name = layerrule-12
  blur = on
  match:namespace = logout_dialog
}
